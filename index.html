<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architecture Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar">
    <header class="site-header">
      <div class="wordmark">ARCHITECTURE&nbsp;MAP</div>
      <div class="tagline">영국 · 유럽 건축 탐방 아카이브</div>
      <div class="header-meta">
        <span id="storage-mode" class="storage-mode"></span>
        <span class="counts">
          <span id="stat-visited">0</span> visited
          <span class="sep">·</span>
          <span id="stat-tovisit">0</span> to&nbsp;visit
        </span>
      </div>
    </header>

    <div class="toolbar">
      <input type="search" id="search" placeholder="검색 — 이름 · 도시 · 건축가" autocomplete="off" />
      <div class="toolbar-row">
        <select id="filter-country" aria-label="국가 필터"><option value="">All countries</option></select>
        <select id="sort" aria-label="정렬">
          <option value="name">Name</option>
          <option value="year">Year</option>
          <option value="city">City</option>
        </select>
      </div>
      <div class="filters">
        <label class="chip"><input type="checkbox" id="filter-visited" checked /> <span class="dot visited"></span>가본 곳</label>
        <label class="chip"><input type="checkbox" id="filter-tovisit" checked /> <span class="dot tovisit"></span>갈 곳</label>
      </div>
    </div>

    <details id="add-panel">
      <summary>건축물 추가 +</summary>
      <form id="add-form" class="add-form">
        <input type="text" id="f-name" placeholder="이름 (예: 루브르 피라미드)" required />
        <div class="two">
          <input type="text" id="f-city" placeholder="도시 (예: Paris)" />
          <input type="text" id="f-country" placeholder="국가 (예: France)" />
        </div>
        <div class="geocode-row">
          <input type="text" id="f-query" placeholder="좌표 검색어 (예: Louvre Pyramid Paris)" />
          <button type="button" id="geocode-btn">검색</button>
        </div>
        <div id="geocode-results" class="geocode-results"></div>
        <div class="two">
          <input type="number" step="any" id="f-lat" placeholder="위도(lat)" required />
          <input type="number" step="any" id="f-lng" placeholder="경도(lng)" required />
        </div>
        <input type="text" id="f-architect" placeholder="건축가" />
        <input type="number" id="f-year" placeholder="연도" />
        <input type="text" id="f-photo" placeholder="사진 URL (선택)" />
        <textarea id="f-note" placeholder="메모 (선택)" rows="2"></textarea>
        <div class="status-pick">
          <label><input type="radio" name="f-status" value="toVisit" checked /> 갈 곳</label>
          <label><input type="radio" name="f-status" value="visited" /> 가본 곳</label>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">지도에 추가</button>
          <button type="button" id="export-btn" class="ghost">data.js 코드 복사</button>
        </div>
      </form>
    </details>

    <ul id="place-list" class="archive"></ul>
  </aside>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
