<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architecture Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar">
    <header>
      <h1>Architecture Map</h1>
      <p class="subtitle">가본 곳과 갈 곳</p>
    </header>
    <div class="filters">
      <label><input type="checkbox" id="filter-visited" checked /> <span class="dot visited"></span> 가본 곳</label>
      <label><input type="checkbox" id="filter-tovisit" checked /> <span class="dot tovisit"></span> 갈 곳</label>
    </div>
    <ul id="place-list"></ul>
  </aside>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
